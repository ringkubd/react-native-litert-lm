apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

repositories {
    google()
    mavenCentral()
}

android {
    namespace = "com.reactnativelitertlm"
    compileSdk = 35

    defaultConfig {
        minSdk = 26
        targetSdk = 35
        versionCode = 1
        versionName = "0.2.0"
    }

    buildTypes {
        release {
            minifyEnabled = false
            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    // React Native + Expo are provided by the host project
    compileOnly "com.facebook.react:react-android"
    compileOnly "expolib_v1.com.facebook.react:react-native:+"

    // LiteRT-LM — optional; engine has stub fallbacks when unavailable.
    // Add the official dependency here when Google publishes the public artifact.
    // See: https://ai.google.dev/edge/litert
    // implementation "com.google.ai.edge.litert:litert-lm:1.0.0"

    // Coroutines for async inference (background thread)
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0"

    // Expo Modules Core — needed only for Expo autolinking
    // Provided by the host project when using Expo
    compileOnly "expomodules:expo-modules-core:+"
}
