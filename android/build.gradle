apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

repositories {
    google()
    mavenCentral()
}

android {
    namespace = "com.reactnativelitertlm"
    compileSdk = 35

    defaultConfig {
        minSdk = 26
        targetSdk = 35
        versionCode = 1
        versionName = "0.2.0"
    }

    buildTypes {
        release {
            minifyEnabled = false
            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    // React Native + Expo — provided by the host project
    compileOnly "com.facebook.react:react-android"

    // LiteRT-LM — Google AI Edge on-device LLM runtime (Android)
    // https://github.com/google-ai-edge/LiteRT-LM
    // Available on Google Maven: https://maven.google.com/web/index.html#com.google.ai.edge.litertlm
    implementation("com.google.ai.edge.litertlm:litertlm-android:latest.release")

    // Coroutines for async inference on background threads
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0"
}

