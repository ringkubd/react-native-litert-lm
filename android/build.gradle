apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

repositories {
    google()
    mavenCentral()
    maven { url "https://storage.googleapis.com/download.tensorflow.org/tensorflow/lite" }
}

android {
    namespace = "com.reactnativelitertlm"
    compileSdk = 35

    defaultConfig {
        minSdk = 26
        targetSdk = 35
        versionCode = 1
        versionName = "0.2.0"
    }

    buildTypes {
        release {
            minifyEnabled = false
            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    // Expo Modules Core — provided by the host app via autolinking
    compileOnly "com.facebook.react:react-android"

    // LiteRT-LM — optional; engine gracefully falls back to CPU stubs if unavailable.
    // When Google publishes the official artifact, change to implementation.
    // See: https://ai.google.dev/edge/litert
    compileOnly("com.google.ai.edge.litert:litert-lm:1.0.0") {
        exclude group: 'com.google.ai.edge.litert'
    }

    // Coroutines for async inference
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0"

    // React Native
    implementation "com.facebook.react:react-android"
}
